version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: "bun"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "bun"
      - "automated"
    groups:
      minor-patch-updates:
        patterns:
          - "*"
        exclude-patterns:
          - "react"
          - "next"
          - "typescript"
          - "@effect/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    versioning-strategy: increase