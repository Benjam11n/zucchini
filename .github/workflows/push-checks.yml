name: Push Checks

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: push-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fallow:
    name: Fallow Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dead code
        uses: fallow-rs/fallow@v2
        with:
          command: dead-code
          format: sarif
          production: true
          comment: true
          annotations: true
          max-annotations: 50

      - name: Check duplication
        uses: fallow-rs/fallow@v2
        with:
          command: dupes
          format: sarif
          production: true
          comment: true
          annotations: true
          max-annotations: 50

  desktop-checks:
    name: Desktop Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm --dir apps/desktop audit:ci

      - name: Lint repository
        run: pnpm run lint

      - name: Typecheck desktop app
        run: pnpm --dir apps/desktop typecheck

      - name: Run desktop tests
        run: pnpm run test:desktop

  web-checks:
    name: Web Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm --dir apps/web audit:ci

      - name: Build web app
        run: pnpm run build:web
