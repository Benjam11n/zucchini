name: Push Checks

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: push-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fallow:
    name: Fallow Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dead code
        uses: fallow-rs/fallow@7bfd0beaff18fc6f706622746991f2d8bc9bfc5e
        with:
          command: dead-code
          format: sarif
          production: true
          comment: true
          annotations: true
          max-annotations: 50

      - name: Check duplication
        uses: fallow-rs/fallow@7bfd0beaff18fc6f706622746991f2d8bc9bfc5e
        with:
          command: dupes
          format: json
          production: true
          comment: true
          annotations: true
          max-annotations: 50

  desktop-checks:
    name: Desktop Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron binary
        run: pnpm --dir apps/desktop exec node node_modules/electron/install.js

      - name: Audit dependencies
        run: pnpm --dir apps/desktop audit:ci

      - name: Lint repository
        run: pnpm run lint

      - name: Typecheck desktop app
        run: pnpm --dir apps/desktop typecheck

      - name: Run desktop tests
        env:
          ELECTRON_OVERRIDE_DIST_PATH: /tmp
        run: pnpm run test:desktop

  web-checks:
    name: Web Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm --dir apps/web audit:ci

      - name: Build web app
        run: pnpm run build:web
