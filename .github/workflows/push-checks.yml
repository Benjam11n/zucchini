name: Push Checks

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: push-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-checks:
    name: Desktop Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun run --cwd apps/desktop audit:ci

      - name: Check formatting
        run: bun run format:check

      - name: Lint desktop app
        run: bun run lint:desktop

      - name: Typecheck desktop app
        run: bun run --cwd apps/desktop typecheck

      - name: Run desktop tests
        run: bun run test:desktop

      - name: Check desktop unused code
        run: bun run --cwd apps/desktop knip

  web-checks:
    name: Web Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint web app
        run: bun run lint:web

      - name: Build web app
        run: bun run build:web
