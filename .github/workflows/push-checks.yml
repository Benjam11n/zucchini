name: Push Checks

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: push-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-checks:
    name: Desktop Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm --dir apps/desktop audit:ci

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint desktop app
        run: pnpm run lint:desktop

      - name: Typecheck desktop app
        run: pnpm --dir apps/desktop typecheck

      - name: Run desktop tests
        run: pnpm run test:desktop

      - name: Check desktop unused code
        run: pnpm --dir apps/desktop knip

  web-checks:
    name: Web Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm --dir apps/web audit:ci

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint web app
        run: pnpm run lint:web

      - name: Build web app
        run: pnpm run build:web
