name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact_name: release-build-windows
          - os: macos-14
            artifact_name: release-build-macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native desktop dependencies
        run: pnpm --dir apps/desktop rebuild:native

      - name: Audit dependencies
        run: pnpm --dir apps/desktop audit:ci

      - name: Run tests
        run: pnpm --dir apps/desktop test

      - name: Build app bundles
        run: pnpm --dir apps/desktop build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/dist
            apps/desktop/dist-electron
          if-no-files-found: error

  prepare-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Generate release notes
        run: pnpm --dir apps/desktop exec node scripts/generate-changelog.mjs --tag "${{ github.ref_name }}" --output ../../release-notes.md

      - name: Create or update draft release
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" \
              --draft \
              --title "Zucchini ${GITHUB_REF_NAME#v}" \
              --notes-file release-notes.md

          gh release edit "${{ github.ref_name }}" \
            --draft \
            --title "Zucchini ${GITHUB_REF_NAME#v}" \
            --notes-file release-notes.md

  release:
    needs:
      - build
      - prepare-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact_name: release-build-windows
            release_script: dist:release:win
          - os: macos-14
            artifact_name: release-build-macos
            release_script: dist:release:mac

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_RELEASE_OWNER: ${{ github.repository_owner }}
      GH_RELEASE_REPO: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native desktop dependencies
        run: pnpm --dir apps/desktop rebuild:native

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/desktop

      - name: Publish release artifacts
        run: pnpm --dir apps/desktop ${{ matrix.release_script }}
